# lightning==2.3.0.dev0
seed_everything: 1
trainer:
  accelerator: gpu
  devices: 1
  strategy: auto
  max_epochs: 20
  use_distributed_sampler: false
  limit_train_batches: 500
  log_every_n_steps: 1
  check_val_every_n_epoch: 1
  default_root_dir: ./results
model:
  forecaster:
    class_path: probts.model.forecaster.prob_forecaster.DyffusionAE
    init_args:
      # AutoEncoder parameters
      latent_dim: 16
      encoder_hidden_dim: 128
      decoder_hidden_dim: 128
      # Dyffusion parameters
      hidden_dim: 128
      num_layers: 2
      time_embed_dim: 64
      dropout: 0.1
      num_diffusion_steps: 96   # N = h
      sampling_steps: 96        # use full schedule at inference
      training_stage: forecaster
      lookahead_loss: true      # Eq. (3) + look-ahead
      condition_on_xt: false
      stochastic_interpolator: true
  num_samples: 50
  learning_rate: 0.001
  quantiles_num: 20
data:
  data_manager:
    class_path: probts.data.data_manager.DataManager
    init_args:
      dataset: sst_patch_00
      split_val: true
      scaler: standard
      scaler_fit_on_full_data: true
      context_length: 96
      prediction_length: 96
  batch_size: 8
  test_batch_size: 4
  num_workers: 1
