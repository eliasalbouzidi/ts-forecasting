# Dyffusion on SST dataset: Train until 2008, Val+Test after 2008
# This config runs Dyffusion classique (no autoencoder) on the SST patch data
# Training: 1981-2008 (28 years)
# Validation: 2009-2016 (8 years)  
# Test: 2017-2025 (9 years, with 2019-2022 missing)

seed_everything: 1
trainer:
  accelerator: gpu
  devices: 1
  strategy: auto
  max_epochs: 50
  use_distributed_sampler: false
  limit_train_batches: 2000
  log_every_n_steps: 1
  check_val_every_n_epoch: 1
  default_root_dir: ./results
  
model:
  forecaster:
    class_path: probts.model.forecaster.prob_forecaster.Dyffusion
    init_args:
      # Dyffusion parameters
      training_stage: forecaster
      hidden_dim: 128
      num_layers: 2
      time_embed_dim: 64
      dropout: 0.1
      num_diffusion_steps: 96
      sampling_steps: 96
      lookahead_loss: true
      condition_on_xt: false
      stochastic_interpolator: true
      
      use_lags: false
      use_feat_idx_emb: false
      use_time_feat: false
      use_scaling: false
      
  num_samples: 100
  learning_rate: 0.001
  quantiles_num: 20
  
data:
  data_manager:
    class_path: probts.data.data_manager.DataManager
    init_args:
      dataset: sst
      path: ./datasets
      data_path: sst/sst_patch_00.csv
      
      # Time split configuration
      split_val: true
      train_ratio: 0.67   # ~1981-2008 (28 years out of 42)
      test_ratio: 0.21    # ~2017-2025 (9 years)
      # Validation: automatic (remaining ~8 years, 2009-2016)
      
      # Context and prediction lengths
      context_length: 96      # 96 days of history
      prediction_length: 96   # 96 days forecast
      
      # Scaler configuration
      scaler: standard
      scaler_fit_on_full_data: false  # Only fit on training data (no leakage)
      freq: 'D'
      
  batch_size: 128
  test_batch_size: 64
  num_workers: 2
