# lightning==2.3.0.dev0
seed_everything: 1
monitor_metric: val_norm_MAE
wandb_run_name: itransformer_solar_nips_l2
trainer:
  accelerator: gpu
  devices: 1
  strategy: auto
  max_epochs: 1
  max_steps: 3000
  use_distributed_sampler: false
  limit_train_batches: 3000
  val_check_interval: 0.25
  log_every_n_steps: 1
  default_root_dir: ./results
model:
  forecaster:
    class_path: probts.model.forecaster.point_forecaster.iTransformer
    init_args:
      loss_type: l2
      factor: 1
      n_heads: 8
      activation: 'gelu'
      e_layers: 2
      output_attention: false
      f_hidden_size: 256
      d_ff: 256
      label_len: 48
      use_lags: false
      use_feat_idx_emb: false
      use_time_feat: false
      feat_idx_emb_dim: 1
  num_samples: 1
  learning_rate: 1e-4
  quantiles_num: 20
  wandb_report_metrics: ["loss", "MSE", "MAE", "sMAPE", "CRPS", "DTW"]
data:
  data_manager:
    class_path: probts.data.data_manager.DataManager
    init_args:
      dataset: solar_nips
      scaler: standard
      scaler_fit_on_full_data: false
      split_val: true
      context_length: 96
      prediction_length: 96
  batch_size: 32
  test_batch_size: 64
  num_workers: 1
